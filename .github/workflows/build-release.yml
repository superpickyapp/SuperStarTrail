name: Build and Release SuperStarTrail

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example 0.5.1)"
        required: true

jobs:
  build-windows-x64:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Visual C++ Redistributable
        shell: pwsh
        run: choco install vcredist-all -y --no-progress

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements-lock.txt
            requirements-dev.txt

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if ($env:EVENT_NAME -eq "workflow_dispatch") {
            $rawVersion = $env:INPUT_VERSION
          } else {
            $rawVersion = $env:REF_NAME
          }

          if (-not $rawVersion) {
            throw "Release version is required."
          }

          $version = if ($rawVersion.StartsWith("v")) { $rawVersion.Substring(1) } else { $rawVersion }
          $tag = "v$version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Validate app version
        shell: pwsh
        env:
          EXPECTED_VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          $appVersion = python -c "import sys; from pathlib import Path; sys.path.insert(0, str(Path('src').resolve())); from utils.settings import APP_VERSION; print(APP_VERSION)"
          if ($appVersion -ne $env:EXPECTED_VERSION) {
            throw "APP_VERSION ($appVersion) does not match release version ($env:EXPECTED_VERSION)."
          }

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-lock.txt -r requirements-dev.txt pyinstaller

      - name: Run CI test suite
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest -q `
            tests/test_parameters_panel.py `
            tests/test_raw_processor_unit.py `
            tests/test_file_naming.py `
            tests/test_stacking_engine.py `
            tests/test_settings.py

      - name: Build Windows executable
        shell: pwsh
        run: pyinstaller SuperStarTrail-Windows.spec --clean --noconfirm

      - name: Prepare Windows release asset
        id: package_windows
        shell: pwsh
        env:
          VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          $assetName = "SuperStarTrail-v$env:VERSION-win64.zip"
          $exePath = "dist/SuperStarTrail.exe"
          if (-not (Test-Path $exePath)) {
            throw "Expected build output not found: $exePath"
          }
          Compress-Archive -Path $exePath -DestinationPath "dist/$assetName" -Force
          "asset=dist/$assetName" >> $env:GITHUB_OUTPUT

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-release
          path: ${{ steps.package_windows.outputs.asset }}
          if-no-files-found: error

  build-macos-arm64:
    runs-on: macos-14
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements-lock.txt
            requirements-dev.txt

      - name: Resolve release metadata
        id: release_meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RAW_VERSION="$INPUT_VERSION"
          else
            RAW_VERSION="$REF_NAME"
          fi

          if [ -z "$RAW_VERSION" ]; then
            echo "Release version is required." >&2
            exit 1
          fi

          if [[ "$RAW_VERSION" == v* ]]; then
            VERSION="${RAW_VERSION#v}"
          else
            VERSION="$RAW_VERSION"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate app version
        env:
          EXPECTED_VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          APP_VERSION=$(python3 -c "import sys; from pathlib import Path; sys.path.insert(0, str(Path('src').resolve())); from utils.settings import APP_VERSION; print(APP_VERSION)")
          if [ "$APP_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "APP_VERSION ($APP_VERSION) does not match release version ($EXPECTED_VERSION)." >&2
            exit 1
          fi

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements-lock.txt -r requirements-dev.txt pyinstaller
          brew install create-dmg

      - name: Run CI test suite
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python3 -m pytest -q \
            tests/test_parameters_panel.py \
            tests/test_raw_processor_unit.py \
            tests/test_file_naming.py \
            tests/test_stacking_engine.py \
            tests/test_settings.py

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PWD=$(openssl rand -hex 16)

          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PWD=$KEYCHAIN_PWD" >> "$GITHUB_ENV"

      - name: Build macOS app
        run: pyinstaller SuperStarTrail.spec --clean --noconfirm

      - name: Sign application
        env:
          DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID || secrets.SIGNING_IDENTITY }}
        run: |
          APP_PATH="dist/SuperStarTrail.app"

          echo "Available signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          # 先逐一签名所有动态库和可执行文件，出错立即失败
          find "$APP_PATH/Contents" -type f \( -name "*.dylib" -o -name "*.so" -o -perm -111 \) -print0 | \
            xargs -0 -I {} codesign --force --sign "$DEVELOPER_ID" --timestamp --options runtime "{}"

          # 再签名 .app bundle（不用 --deep，避免覆盖上面已签名的组件）
          codesign --force --sign "$DEVELOPER_ID" \
            --timestamp \
            --options runtime \
            --entitlements entitlements.plist \
            "$APP_PATH"

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Create and sign DMG
        id: package_macos
        env:
          VERSION: ${{ steps.release_meta.outputs.version }}
          DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID || secrets.SIGNING_IDENTITY }}
        run: |
          APP_PATH="dist/SuperStarTrail.app"
          DMG_NAME="SuperStarTrail-v${VERSION}-arm64.dmg"
          DMG_TEMP="dist/dmg_temp"

          rm -rf "$DMG_TEMP"
          mkdir -p "$DMG_TEMP"
          cp -R "$APP_PATH" "$DMG_TEMP/"

          if [ -f "DMG_README.txt" ]; then
            cp "DMG_README.txt" "$DMG_TEMP/README.txt"
          fi

          create-dmg \
            --volname "SuperStarTrail ${VERSION}" \
            --window-pos 200 120 \
            --window-size 580 380 \
            --icon-size 100 \
            --icon "SuperStarTrail.app" 140 180 \
            --hide-extension "SuperStarTrail.app" \
            --app-drop-link 440 180 \
            --no-internet-enable \
            "dist/${DMG_NAME}" \
            "$DMG_TEMP"

          rm -rf "$DMG_TEMP"

          codesign --force --sign "$DEVELOPER_ID" --timestamp "dist/${DMG_NAME}"

          echo "asset=dist/${DMG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Notarize and staple DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD || secrets.APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.MACOS_TEAM_ID || secrets.TEAM_ID }}
          DMG_PATH: ${{ steps.package_macos.outputs.asset }}
        run: |
          NOTARIZE_OUTPUT=$(xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait \
            --output-format json 2>&1)

          echo "$NOTARIZE_OUTPUT"

          if ! echo "$NOTARIZE_OUTPUT" | jq -e '.status == "Accepted"' > /dev/null; then
            echo "Notarization failed." >&2
            exit 1
          fi

          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-release
          path: ${{ steps.package_macos.outputs.asset }}
          if-no-files-found: error

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

  release:
    runs-on: ubuntu-latest
    needs:
      - build-windows-x64
      - build-macos-arm64
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: release_meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RAW_VERSION="$INPUT_VERSION"
          else
            RAW_VERSION="$REF_NAME"
          fi

          if [ -z "$RAW_VERSION" ]; then
            echo "Release version is required." >&2
            exit 1
          fi

          if [[ "$RAW_VERSION" == v* ]]; then
            TAG="$RAW_VERSION"
          else
            TAG="v$RAW_VERSION"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=SuperStarTrail $TAG" >> "$GITHUB_OUTPUT"

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets

      - name: Flatten release assets
        run: |
          mkdir -p release_files
          find release_assets -maxdepth 2 -type f -exec cp {} release_files/ \;
          ls -lah release_files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          files: release_files/*
