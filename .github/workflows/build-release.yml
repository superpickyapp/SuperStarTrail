name: Build and Release SuperStarTrail

# 触发条件：推送 vX.Y.Z 标签，或手动触发
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.6.0)"
        required: true

# ─────────────────────────────────────────────────────────────
# 公共工具函数：解析版本号（在各 job 中重复使用）
# ─────────────────────────────────────────────────────────────

jobs:
  # ══════════════════════════════════════════════════════════
  # Job 1 – Windows x64
  # ══════════════════════════════════════════════════════════
  build-windows:
    name: "🪟 Build Windows x64"
    runs-on: windows-latest
    permissions:
      contents: read

    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag:     ${{ steps.meta.outputs.tag }}
      asset:   ${{ steps.package.outputs.asset }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-lock.txt

      # ── 3. 解析版本元数据 ─────────────────────────────────
      - name: Resolve release metadata
        id: meta
        shell: pwsh
        env:
          EVENT_NAME:    ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME:      ${{ github.ref_name }}
        run: |
          if ($env:EVENT_NAME -eq "workflow_dispatch") {
            $raw = $env:INPUT_VERSION
          } else {
            $raw = $env:REF_NAME
          }
          if (-not $raw) { throw "Release version is required." }
          $version = if ($raw.StartsWith("v")) { $raw.Substring(1) } else { $raw }
          $tag = "v$version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag"         >> $env:GITHUB_OUTPUT
          Write-Host "Building version=$version  tag=$tag"

      # ── 4. 校验代码内版本号 ───────────────────────────────
      - name: Validate APP_VERSION in source
        shell: pwsh
        env:
          EXPECTED: ${{ steps.meta.outputs.version }}
        run: |
          $actual = python -c "import sys; from pathlib import Path; sys.path.insert(0, str(Path('src').resolve())); from utils.settings import APP_VERSION; print(APP_VERSION)"
          if ($actual -ne $env:EXPECTED) {
            throw "Source APP_VERSION='$actual' != expected '$env:EXPECTED'. Update utils/settings.py before tagging."
          }
          Write-Host "APP_VERSION check passed: $actual"

      # ── 5. 安装依赖 ───────────────────────────────────────
      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt pyinstaller

      # ── 6. 单元测试（跳过 GUI/display 相关测试）────────────
      - name: Run unit tests
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          pip install pytest
          python -m pytest -q `
            tests/test_file_naming.py `
            tests/test_settings.py `
            --tb=short

      # ── 7. PyInstaller 打包 ──────────────────────────────
      - name: Build Windows executable
        shell: pwsh
        run: |
          pyinstaller SuperStarTrail-Windows.spec --clean --noconfirm

      # ── 8. 验证产物存在 ──────────────────────────────────
      - name: Verify build output
        shell: pwsh
        run: |
          $exe = "dist\SuperStarTrail.exe"
          if (-not (Test-Path $exe)) {
            Get-ChildItem dist -Recurse | Select-Object FullName
            throw "Expected exe not found: $exe"
          }
          $size = (Get-Item $exe).Length / 1MB
          Write-Host "Build OK: $exe  ($([math]::Round($size,1)) MB)"

      # ── 9. 打包成 ZIP ────────────────────────────────────
      - name: Package release ZIP
        id: package
        shell: pwsh
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          $name = "SuperStarTrail-v$env:VERSION-win64.zip"
          $dest = "dist\$name"
          # 将 exe 和 README 一起打包
          $files = @("dist\SuperStarTrail.exe")
          if (Test-Path "DMG_README.txt") { $files += "DMG_README.txt" }
          Compress-Archive -Path $files -DestinationPath $dest -Force
          $size = (Get-Item $dest).Length / 1MB
          Write-Host "ZIP created: $dest  ($([math]::Round($size,1)) MB)"
          "asset=$dest" >> $env:GITHUB_OUTPUT

      # ── 10. 上传 Artifact ─────────────────────────────────
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error
          retention-days: 7

  # ══════════════════════════════════════════════════════════
  # Job 2 – macOS arm64（签名/公证后续补充）
  # ══════════════════════════════════════════════════════════
  build-macos:
    name: "🍎 Build macOS arm64"
    runs-on: macos-14
    permissions:
      contents: read

    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag:     ${{ steps.meta.outputs.tag }}
      asset:   ${{ steps.package.outputs.asset }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-lock.txt

      - name: Resolve release metadata
        id: meta
        env:
          EVENT_NAME:    ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME:      ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RAW="$INPUT_VERSION"
          else
            RAW="$REF_NAME"
          fi
          [ -z "$RAW" ] && { echo "Release version is required." >&2; exit 1; }
          VERSION="${RAW#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"    >> "$GITHUB_OUTPUT"
          echo "Building version=$VERSION"

      - name: Validate APP_VERSION in source
        env:
          EXPECTED: ${{ steps.meta.outputs.version }}
        run: |
          ACTUAL=$(python3 -c "import sys; from pathlib import Path; sys.path.insert(0, str(Path('src').resolve())); from utils.settings import APP_VERSION; print(APP_VERSION)")
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "Source APP_VERSION='$ACTUAL' != expected '$EXPECTED'." >&2
            exit 1
          fi
          echo "APP_VERSION check passed: $ACTUAL"

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements-lock.txt pyinstaller pytest
          brew install create-dmg

      - name: Run unit tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python3 -m pytest -q \
            tests/test_file_naming.py \
            tests/test_settings.py \
            --tb=short

      - name: Build macOS app bundle
        run: |
          pyinstaller SuperStarTrail.spec --clean --noconfirm

      # ── 签名（可选：仅当 secret 存在时执行）────────────────
      - name: Import signing certificate
        if: ${{ secrets.MACOS_CERTIFICATE != '' }}
        env:
          MACOS_CERTIFICATE:     ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PWD=$(openssl rand -hex 16)
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PWD=$KEYCHAIN_PWD"   >> "$GITHUB_ENV"

      - name: Sign application
        if: ${{ secrets.MACOS_CERTIFICATE != '' }}
        env:
          DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID }}
        run: |
          APP="dist/SuperStarTrail.app"
          find "$APP/Contents" -type f \( -name "*.dylib" -o -name "*.so" -o -perm -111 \) -print0 | \
            xargs -0 -I {} codesign --force --sign "$DEVELOPER_ID" --timestamp --options runtime "{}"
          codesign --force --sign "$DEVELOPER_ID" \
            --timestamp --options runtime \
            --entitlements entitlements.plist "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Create DMG
        id: package
        env:
          VERSION:      ${{ steps.meta.outputs.version }}
          DEVELOPER_ID: ${{ secrets.MACOS_DEVELOPER_ID }}
        run: |
          APP="dist/SuperStarTrail.app"
          DMG_NAME="SuperStarTrail-v${VERSION}-arm64.dmg"
          STAGING="dist/dmg_staging"

          rm -rf "$STAGING" && mkdir -p "$STAGING"
          cp -R "$APP" "$STAGING/"
          [ -f DMG_README.txt ] && cp DMG_README.txt "$STAGING/README.txt"

          create-dmg \
            --volname "SuperStarTrail ${VERSION}" \
            --window-pos 200 120 \
            --window-size 580 380 \
            --icon-size 100 \
            --icon "SuperStarTrail.app" 140 180 \
            --hide-extension "SuperStarTrail.app" \
            --app-drop-link 440 180 \
            --no-internet-enable \
            "dist/${DMG_NAME}" \
            "$STAGING"

          rm -rf "$STAGING"

          # 仅当有签名 secret 时才签名 DMG
          if [ -n "$DEVELOPER_ID" ]; then
            codesign --force --sign "$DEVELOPER_ID" --timestamp "dist/${DMG_NAME}"
          fi

          echo "asset=dist/${DMG_NAME}" >> "$GITHUB_OUTPUT"

      # ── 公证（可选：仅当 secret 存在时执行）────────────────
      - name: Notarize and staple DMG
        if: ${{ secrets.APPLE_ID != '' }}
        env:
          APPLE_ID:          ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID:           ${{ secrets.MACOS_TEAM_ID }}
          DMG_PATH:          ${{ steps.package.outputs.asset }}
        run: |
          OUTPUT=$(xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait --output-format json 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | jq -e '.status == "Accepted"' \
            || { echo "Notarization failed." >&2; exit 1; }
          xcrun stapler staple   "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error
          retention-days: 7

      - name: Clean up keychain
        if: always()
        run: |
          [ -n "${KEYCHAIN_PATH:-}" ] && security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

  # ══════════════════════════════════════════════════════════
  # Job 3 – 创建 GitHub Release（等待所有构建完成）
  # ══════════════════════════════════════════════════════════
  release:
    name: "🚀 Create GitHub Release"
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        env:
          EVENT_NAME:    ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME:      ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            RAW="$INPUT_VERSION"
          else
            RAW="$REF_NAME"
          fi
          [ -z "$RAW" ] && { echo "Release version is required." >&2; exit 1; }
          VERSION="${RAW#v}"
          TAG="v$VERSION"
          echo "tag=$TAG"                      >> "$GITHUB_OUTPUT"
          echo "name=SuperStarTrail $TAG"      >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets

      - name: List collected assets
        run: find release_assets -type f | sort

      - name: Flatten assets into one directory
        run: |
          mkdir -p release_files
          find release_assets -maxdepth 2 -type f -exec cp {} release_files/ \;
          echo "── Files to publish ──"
          ls -lah release_files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.meta.outputs.tag }}
          name:       ${{ steps.meta.outputs.name }}
          draft:      false
          prerelease: false
          files:      release_files/*
          body: |
            ## SuperStarTrail ${{ steps.meta.outputs.tag }}

            ### 下载

            | 平台 | 文件 |
            |------|------|
            | 🪟 Windows x64 | `SuperStarTrail-${{ steps.meta.outputs.tag }}-win64.zip` |
            | 🍎 macOS arm64 | `SuperStarTrail-${{ steps.meta.outputs.tag }}-arm64.dmg` |

            ### 安装说明
            - **Windows**：解压 ZIP，直接运行 `SuperStarTrail.exe`
            - **macOS**：打开 DMG，将应用拖入 Applications 文件夹

            ---
            Built automatically by GitHub Actions.
